name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace=@fuzhou-mahjong/shared

      - name: Typecheck
        run: npm run typecheck

      - name: Build all
        run: npm run build

      - name: Copy files to deploy host
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "apps/,packages/,package.json,package-lock.json,docker-compose.yml,.dockerignore,tsconfig.json"
          target: /Users/minyic/fuzhou-mahjong/

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /Users/minyic/fuzhou-mahjong
            docker compose down
            docker compose build --no-cache
            docker compose up -d
