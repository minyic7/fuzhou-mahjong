name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace=@fuzhou-mahjong/shared

      - name: Typecheck
        run: npm run typecheck

      - name: Build all
        run: npm run build

      - name: Wait for Tailscale connectivity
        run: |
          for i in $(seq 1 30); do
            if tailscale ping --timeout=2s ${{ secrets.DEPLOY_HOST }} >/dev/null 2>&1; then
              echo "Tailscale connectivity confirmed"
              exit 0
            fi
            echo "Waiting for Tailscale connection... ($i/30)"
            sleep 2
          done
          echo "Failed to establish Tailscale connectivity"
          exit 1

      - name: Copy files to deploy host
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          timeout: 120s
          source: "apps/,packages/,package.json,package-lock.json,docker-compose.yml,.dockerignore,tsconfig.json"
          target: /Users/minyic/fuzhou-mahjong/

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 10m
          script: |
            cd /Users/minyic/fuzhou-mahjong
            docker compose down
            docker compose build --no-cache
            docker compose up -d
